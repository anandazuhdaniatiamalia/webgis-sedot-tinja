<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS Ngawi - High Speed</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; background: #e5e7eb; }

        /* Sidebar Melayang Modern */
        .dashboard-ui {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            width: 280px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); padding: 20px;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .stat-box { background: #3498db; color: white; border-radius: 10px; padding: 10px; margin-bottom: 15px; }
        
        /* Skeleton Screen / Loader */
        #loader {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 500; color: #666;">Memuat Database Spasial...</p>
    </div>

    <div class="dashboard-ui">
        <h6 class="fw-bold mb-1">WebGIS Sedot Tinja</h6>
        <p class="text-muted mb-3" style="font-size: 11px;">Kabupaten Ngawi - Progres 2025</p>
        
        <div class="stat-box text-center">
            <small>Total Layanan</small>
            <div id="counter" class="h3 fw-bold m-0">0</div>
        </div>

        <div class="mb-3">
            <input type="text" id="searchInput" class="form-control form-control-sm shadow-none" placeholder="Cari Nama/Desa...">
        </div>

        <select id="kecamatanFilter" class="form-select form-select-sm mb-2 shadow-none">
            <option value="">Semua Kecamatan</option>
        </select>
        
        <hr>
        <div id="legend" style="font-size: 11px;">
            <span class="badge bg-primary rounded-pill">&nbsp;</span> Titik Lokasi Terdata
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // 1. Optimasi Peta (Gunakan Canvas Renderer)
        const map = L.map('map', {
            preferCanvas: true, // WAJIB: Render ribuan titik dalam satu kanvas (sangat cepat)
            zoomControl: false,
            attributionControl: false
        }).setView([-7.40, 111.44], 11);

        // Basemap yang ringan (CartoDB Light)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let dataLokal = [];
        const layerTitik = L.layerGroup().addTo(map);

        // 2. Fetch Data CSV (Optimasi Background Thread)
        Papa.parse('Titik_Koordinat_2025_5.csv', {
            download: true,
            header: true,
            dynamicTyping: true,
            worker: true, // Gunakan worker agar UI tidak beku
            complete: function(results) {
                dataLokal = results.data.filter(d => d.Y && d.X);
                initWebGIS();
            }
        });

        function initWebGIS() {
            renderMarkers();
            isiKecamatan();
            document.getElementById('loader').style.display = 'none';
        }

        // 3. Render Titik dengan Efisiensi Tinggi
        function renderMarkers(filterKec = '', keyword = '') {
            layerTitik.clearLayers();
            keyword = keyword.toLowerCase();
            let count = 0;

            dataLokal.forEach(d => {
                const cocokKec = !filterKec || d.Kecamatan === filterKec;
                const cocokNama = !keyword || (d.Nama && d.Nama.toLowerCase().includes(keyword)) || (d.Desa && d.Desa.toLowerCase().includes(keyword));

                if (cocokKec && cocokNama) {
                    count++;
                    const circle = L.circleMarker([d.Y, d.X], {
                        radius: 5,
                        fillColor: "#007bff",
                        color: "#fff",
                        weight: 1,
                        fillOpacity: 0.8
                    });

                    // Gunakan bindPopup hanya saat diklik (Lazy Loading)
                    circle.on('click', function() {
                        this.bindPopup(`
                            <div style="font-size:12px">
                                <b>${d.Nama}</b><br>
                                ${d.Desa}, ${d.Kecamatan}<hr style="margin:5px 0">
                                Vol: ${d.Volume} m³<br>
                                Jadwal: <span class="text-danger">${d.Jadwal_Penyedotan}</span>
                            </div>
                        `).openPopup();
                    });

                    layerTitik.addLayer(circle);
                }
            });
            document.getElementById('counter').innerText = count;
        }

        // 4. Dropdown & Search (Debounced)
        function isiKecamatan() {
            const list = [...new Set(dataLokal.map(i => i.Kecamatan))].sort();
            const select = document.getElementById('kecamatanFilter');
            list.forEach(k => k && select.add(new Option(k, k)));
        }

        let debounceTimer;
        const inputSearch = document.getElementById('searchInput');
        const filterKec = document.getElementById('kecamatanFilter');

        const filterAction = () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                renderMarkers(filterKec.value, inputSearch.value);
            }, 250);
        };

        inputSearch.addEventListener('input', filterAction);
        filterKec.addEventListener('change', filterAction);
    </script>
</body>
</html>
