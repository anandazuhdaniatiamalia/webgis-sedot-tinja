<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS Sedot Tinja - Ngawi Fast Load</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f4f7f6; }
        #map { height: 100vh; width: 100%; visibility: hidden; } /* Hidden sampai data siap */
        #map.ready { visibility: visible; }

        /* Loading Overlay Modern */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .sidebar-compact {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            width: 300px; background: white; padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .count-badge { background: #eef2f7; border-radius: 8px; padding: 10px; border-left: 4px solid #3498db; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="spinner-grow text-primary" role="status"></div>
        <p class="mt-3 fw-bold text-secondary">Menyiapkan Data Spasial...</p>
    </div>

    <div class="sidebar-compact">
        <h6 class="fw-bold mb-3"><i class="fas fa-faucet text-primary"></i> Monitoring Sanitasi</h6>
        
        <div class="count-badge mb-3">
            <small class="text-muted d-block">Total Titik Terdata:</small>
            <span id="total-titik" class="h4 fw-bold text-dark">0</span>
        </div>

        <div class="mb-2">
            <input type="text" id="search-box" class="form-control form-control-sm" placeholder="Cari Nama / Desa...">
        </div>
        
        <select id="filter-kec" class="form-select form-select-sm mb-3">
            <option value="">Semua Kecamatan</option>
        </select>

        <div style="font-size: 11px; color: #999;">
            *Data diperbarui secara berkala melalui sistem repositori.
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // Inisialisasi Peta
        const map = L.map('map', { 
            preferCanvas: true, // PENTING: Menggunakan Canvas renderer agar ribuan titik tidak berat
            zoomControl: false 
        }).setView([-7.40, 111.44], 11);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let dataStore = [];
        let geoLayer = L.layerGroup().addTo(map);

        // Load Data dengan PapaParse (Worker Mode agar tidak freeze)
        Papa.parse('Titik_Koordinat_2025_5.csv', {
            download: true,
            header: true,
            worker: true, // Menjalankan proses di background thread
            skipEmptyLines: true,
            complete: function(results) {
                dataStore = results.data;
                initApp();
            }
        });

        function initApp() {
            populateKecamatan();
            renderMarkers();
            
            // Sembunyikan loader
            document.getElementById('loader-overlay').style.display = 'none';
            document.getElementById('map').classList.add('ready');
        }

        function renderMarkers(filterKec = '', searchTxt = '') {
            geoLayer.clearLayers();
            searchTxt = searchTxt.toLowerCase();
            let count = 0;

            dataStore.forEach(d => {
                if (!d.Y || !d.X) return;

                const matchKec = !filterKec || d.Kecamatan === filterKec;
                const matchSearch = !searchTxt || 
                                   (d.Nama && d.Nama.toLowerCase().includes(searchTxt)) || 
                                   (d.Desa && d.Desa.toLowerCase().includes(searchTxt));

                if (matchKec && matchSearch) {
                    count++;
                    const marker = L.circleMarker([d.Y, d.X], {
                        radius: 6,
                        fillColor: "#3498db",
                        color: "#fff",
                        weight: 1,
                        fillOpacity: 0.7
                    });

                    marker.bindPopup(`
                        <div style="min-width:150px">
                            <strong style="color:#2c3e50">${d.Nama}</strong><br>
                            <small>${d.Desa}, ${d.Kecamatan}</small><hr style="margin:5px 0">
                            <table style="font-size:11px; width:100%">
                                <tr><td>Volume</td><td>: ${d.Volume} m³</td></tr>
                                <tr><td>Tanggal</td><td>: ${d.Tgl_Penyedotan}</td></tr>
                            </table>
                        </div>
                    `);
                    geoLayer.addLayer(marker);
                }
            });
            document.getElementById('total-titik').innerText = count;
        }

        function populateKecamatan() {
            const list = [...new Set(dataStore.map(i => i.Kecamatan))].sort();
            const select = document.getElementById('filter-kec');
            list.forEach(k => {
                if(k) select.add(new Option(k, k));
            });
        }

        // Event Listeners (Debounced Search)
        let timer;
        document.getElementById('search-box').addEventListener('input', (e) => {
            clearTimeout(timer);
            timer = setTimeout(() => {
                renderMarkers(document.getElementById('filter-kec').value, e.target.value);
            }, 300); // Tunggu 300ms setelah mengetik agar tidak lag
        });

        document.getElementById('filter-kec').addEventListener('change', (e) => {
            renderMarkers(e.target.value, document.getElementById('search-box').value);
        });
    </script>
</body>
</html>
