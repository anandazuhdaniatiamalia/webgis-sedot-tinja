<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS Sedot Tinja - Ngawi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100%; background: #f8f9fa; }
        .floating-panel {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            width: 300px; background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="floating-panel">
        <h6 class="fw-bold mb-1">WebGIS Monitoring</h6>
        <div class="badge bg-primary mb-3">Total Data: <span id="counter">0</span></div>
        <input type="text" id="search" class="form-control form-control-sm mb-2" placeholder="Cari nama...">
        <select id="filterKec" class="form-select form-select-sm"><option value="">Semua Kecamatan</option></select>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const map = L.map('map', { preferCanvas: true }).setView([-7.40, 111.44], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        const markerLayer = L.layerGroup().addTo(map);
        let csvData = [];

        // LOAD DATA DARI CSV
        Papa.parse('Titik_Koordinat_2025_5.csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                csvData = results.data;
                setupFilters();
                updateMap();
            }
        });

        function updateMap() {
            markerLayer.clearLayers();
            const sText = document.getElementById('search').value.toLowerCase();
            const fKec = document.getElementById('filterKec').value;
            
            let count = 0;
            csvData.forEach(d => {
                // PEMBERSIHAN DATA KOORDINAT (FIX UNTUK ERROR INVALID LATLNG)
                let lat = d.Y ? String(d.Y).trim().replace(/[^0-9.-]/g, '') : null;
                let lng = d.X ? String(d.X).trim().replace(/[^0-9.-]/g, '') : null;

                if (lat && lng) {
                    const matchKec = !fKec || d.Kecamatan === fKec;
                    const matchSearch = !sText || d.Nama?.toLowerCase().includes(sText);

                    if (matchKec && matchSearch) {
                        count++;
                        // Gambar marker hanya jika koordinat valid
                        L.circleMarker([parseFloat(lat), parseFloat(lng)], {
                            radius: 6, fillColor: '#007bff', color: '#fff', weight: 1, fillOpacity: 0.8
                        })
                        .bindPopup(`<b>${d.Nama}</b><br>${d.Desa}`)
                        .addTo(markerLayer);
                    }
                }
            });
            document.getElementById('counter').innerText = count;
        }

        function setupFilters() {
            const kecs = [...new Set(csvData.map(d => d.Kecamatan))].sort();
            const sel = document.getElementById('filterKec');
            kecs.forEach(k => k && sel.add(new Option(k, k)));
        }

        document.getElementById('search').addEventListener('input', updateMap);
        document.getElementById('filterKec').addEventListener('change', updateMap);
    </script>
</body>
</html>
